name: Pull Request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK Corretto 24
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'
          architecture: x64

      - name: Validate Java code formatting
        run: mvn -T 1C formatter:validate

  tests:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [ ubuntu, windows ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK Corretto 24
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'
          architecture: x64

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install TypeScript and esbuild
        run: npm install -g typescript@5.9.3 esbuild

      - name: Maven Build
        run: mvn clean install -P unit-tests -U

      - name: Container Tests
        if: runner.os == 'Linux'
        run: mvn test -P testcontainers

  docker-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: amd64
          - runner: ubuntu-24.04-arm
            platform: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK Corretto 24
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install TypeScript and esbuild
        run: npm install -g typescript@5.9.3 esbuild

      - name: Maven Build
        run: mvn clean install -P quick-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: build/application
          platforms: ${{ matrix.platform }}
          push: false

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK Corretto 24
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '24'
          architecture: x64

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install TypeScript and esbuild
        run: npm install -g typescript@5.9.3 esbuild

      - name: Install ttyd (prebuilt)
        run: |
          sudo apt update
          sudo apt install -y ttyd

      - name: Verify ttyd installation
        run: ttyd --version

      # Fast per-PR gate on H2: the HTTP-level ITs plus the few smoke-tagged UI journeys
      # (including two full clone -> generate -> validate app lifecycles). The heavy Selenide
      # suite (@Tag "ui") runs nightly and on master push - see nightly.yml and build.yml.
      - name: Smoke integration tests (H2)
        run: mvn clean install -P integration-tests -Dit.groups="!ui | smoke"

      - name: Generate a random artifact name
        if: always()
        id: generate_name
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          echo "ARTIFACT_NAME=selenide-screenshots-${TIMESTAMP}.zip" >> $GITHUB_ENV

      - name: Upload selenide screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          retention-days: 3
          name: ${{ env.ARTIFACT_NAME }}
          path: tests/tests-integrations/build/reports/tests
