  Generic application-shell landing: a launchpad of the published domain apps, grouped. Rendered into
  #app within the shell's x-data="app" scope, so it reads `groups` and calls `openApp` directly.
-->
<div class="vbox size-full p-6 gap-6" style="overflow:auto;">
  <div class="vbox gap-1">
    <h1 class="text-2xl font-bold">Applications</h1>
    <p x-h-text.muted>Select an application to manage its data.</p>
  </div>

  <div x-show="groups.length === 0" x-h-text.muted>No applications published yet.</div>

  <template x-for="group in groups" :key="group.id">
    <div class="vbox gap-2">
      <h2 class="font-bold" x-text="group.label"></h2>
      <div class="hbox gap-3" style="flex-wrap: wrap;">
        <template x-for="item in group.items" :key="item.id">
          <button x-h-button data-variant="outline" class="hbox items-center gap-2"
                  style="min-width: 200px; justify-content: flex-start;" @click="openApp(item)">
            <template x-if="isImageIcon(item.icon)"><img :src="item.icon" alt="" class="size-4" /></template>
            <template x-if="!isImageIcon(item.icon)"><i role="img" :data-lucide="item.icon || 'box'"></i></template>
            <span x-text="item.label"></span>
          </button>
        </template>
      </div>
    </div>
  </template>
</div>
