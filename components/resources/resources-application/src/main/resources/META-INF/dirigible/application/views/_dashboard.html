  Shared application-shell dashboard: KPI tiles for every published app entity (one per PRIMARY
  perspective, grouped by its navigation group, showing the live record count from the perspective's
  countUrl, click -> open the app) plus a preview tile per discovered report. Rendered into #app within
  the shell's x-data="app" scope, so it reads `groups` / `openApp` / `isImageIcon` / `navigate` and the
  `reports` store directly. KPI-tile style mirrors the standalone per-app dashboard.
-->
<div class="vbox size-full overflow-auto" x-init="$nextTick(() => { if (window.lucide) window.lucide.createIcons(); })">
  <div class="vbox gap-6 p-6">
    <div class="vbox gap-1">
      <h1 class="text-2xl font-bold" x-text="T('application-core:shell.nav.dashboard', 'Dashboard')"></h1>
      <p x-h-text.muted x-text="T('application-core:shell.dashboard.overview', 'Overview of your published applications.')"></p>
    </div>

    <div x-show="!loading && groups.length === 0 && $store.reports.items.length === 0" x-cloak x-h-text.muted>
      No applications published yet.
    </div>

    <!-- Key Indicators: report-attached KPI widgets (reports[].widget) aggregated from every published
         app. A count/value widget is a compact number tile; a list widget is a top-N mini table.
         Clicking a tile opens the full report. Values come from the shared reports store. -->
    <div class="vbox gap-3" x-show="$store.reports.kpiReports().length > 0" x-cloak
         x-effect="$store.reports.kpiReports().length; $nextTick(() => refreshIcons())">
      <div class="hbox items-center gap-2 text-xs font-bold uppercase text-muted-foreground">
        <i role="img" data-lucide="gauge" class="size-4"></i><span x-text="T('application-core:shell.dashboard.kpis', 'Key Indicators')"></span>
      </div>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <template x-for="r in $store.reports.kpiReports()" :key="r.name">
          <div x-h-card role="button" tabindex="0" class="cursor-pointer"
               :class="r.widget.kind === 'list' ? 'sm:col-span-2' : ''"
               @click="$store.reports.selected = r; navigate('/reports')"
               @keydown.enter.prevent="$store.reports.selected = r; navigate('/reports')">
            <div x-h-card-header>
              <div class="hbox items-center gap-2 text-xs font-semibold uppercase text-muted-foreground">
                <i role="img" :data-lucide="r.widget.icon" class="size-4"></i><span x-text="$store.reports.widgetLabel(r)"></span>
              </div>
            </div>
            <div x-h-card-content>
              <template x-if="r.widget.kind !== 'list'">
                <div>
                  <template x-if="!$store.reports.widgetState(r).loaded"><div x-h-skeleton class="w-1/2 h-9"></div></template>
                  <p x-show="$store.reports.widgetState(r).loaded && !$store.reports.widgetState(r).error" class="text-3xl font-bold" x-text="$store.reports.widgetValueText(r)"></p>
                  <p x-show="$store.reports.widgetState(r).error" x-h-text.muted class="text-3xl font-bold">—</p>
                </div>
              </template>
              <template x-if="r.widget.kind === 'list'">
                <div class="overflow-x-auto">
                  <template x-if="!$store.reports.widgetState(r).loaded"><div x-h-skeleton class="w-full h-9"></div></template>
                  <p x-show="$store.reports.widgetState(r).error" x-h-text.muted class="text-3xl font-bold">—</p>
                  <table x-show="$store.reports.widgetState(r).loaded && !$store.reports.widgetState(r).error" class="w-full text-sm">
                    <thead>
                      <tr>
                        <template x-for="c in $store.reports.widgetColumns(r)" :key="c.alias">
                          <th class="py-1 pr-3 text-left font-semibold text-muted-foreground"
                              :class="$store.reports.widgetAlignClass(c)" x-text="c.label"></th>
                        </template>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="(row, i) in $store.reports.widgetRows(r)" :key="i">
                        <tr>
                          <template x-for="c in $store.reports.widgetColumns(r)" :key="c.alias">
                            <td class="py-1 pr-3" :class="$store.reports.widgetAlignClass(c)" x-text="$store.reports.widgetCellText(r, row, c)"></td>
                          </template>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- One KPI section per navigation group; a tile per PRIMARY entity. -->
    <template x-for="group in groups" :key="group.id">
      <div class="vbox gap-3" x-show="group.items.some(i => i.kind === 'PRIMARY')">
        <div class="hbox items-center gap-2 text-xs font-bold uppercase text-muted-foreground">
          <i role="img" data-lucide="layout-grid" class="size-4"></i><span x-text="group.label"></span>
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
          <template x-for="item in group.items.filter(i => i.kind === 'PRIMARY')" :key="item.id">
            <div x-h-card role="button" tabindex="0" class="cursor-pointer"
                 @click="openApp(item)" @keydown.enter.prevent="openApp(item)">
              <div x-h-card-header>
                <div class="hbox items-center gap-2 text-xs font-semibold uppercase text-muted-foreground">
                  <template x-if="isSvgIcon(item.icon)"><svg x-h-icon :data-link="item.icon" class="size-4" role="presentation"></svg></template>
                  <template x-if="isImageIcon(item.icon)"><img :src="item.icon" alt="" class="size-4" /></template>
                  <template x-if="!isSvgIcon(item.icon) && !isImageIcon(item.icon)"><i role="img" :data-lucide="item.icon || 'box'" class="size-4"></i></template>
                  <span x-text="item.label"></span>
                </div>
              </div>
              <div x-h-card-content>
                <template x-if="item.countUrl && item.count === undefined && !item.countError">
                  <div x-h-skeleton class="w-1/2 h-9"></div>
                </template>
                <p x-show="item.count !== undefined" class="text-3xl font-bold" x-text="item.count"></p>
                <p x-show="item.count === undefined && (item.countError || !item.countUrl)" x-h-text.muted class="text-3xl font-bold">—</p>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Reports: an iframe preview tile per non-widget report (widget reports render as KPI tiles
         above; the sidebar Reports section still lists them all). -->
    <div class="vbox gap-3" x-show="$store.reports.previewReports().length > 0" x-cloak>
      <div class="hbox items-center gap-2 text-xs font-bold uppercase text-muted-foreground">
        <i role="img" data-lucide="bar-chart-3" class="size-4"></i><span x-text="T('application-core:shell.nav.reports', 'Reports')"></span>
      </div>
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
        <template x-for="r in $store.reports.previewReports()" :key="r.url">
          <div x-h-card>
            <div x-h-card-header>
              <h3 x-h-card-title class="hbox items-center gap-2 cursor-pointer"
                  @click="$store.reports.selected = r; navigate('/reports')">
                <i role="img" data-lucide="bar-chart-3" class="size-4"></i><span x-text="r.label"></span>
              </h3>
              <div x-h-card-action>
                <button x-h-button data-variant="transparent" data-size="icon-sm"
                        @click="$store.reports.selected = r; navigate('/reports')" aria-label="Open report">
                  <i role="img" data-lucide="arrow-up-right"></i>
                </button>
              </div>
            </div>
            <div x-h-card-content class="vbox gap-2">
              <p x-show="r.description" x-h-text.muted class="text-sm" x-text="r.description"></p>
              <iframe :src="r.url + '?preview=1'" title="Report preview" loading="lazy"
                      style="width:100%; height:220px; border:0;"></iframe>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
