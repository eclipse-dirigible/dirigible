<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="javaSymbols" ng-controller="JavaSymbolsController">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="configs/java-symbols-view.js"></script>
        <meta name="platform-links" category="ng-view">
        <script src="js/java-symbols.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-toolbar no-bottom-border="true" compact="true">
            <bk-toolbar-spacer></bk-toolbar-spacer>
            <bk-popover>
                <bk-popover-control>
                    <bk-button state="transparent" is-menu="true" label="{{ selectedWorkspace }}"></bk-button>
                </bk-popover-control>
                <bk-popover-body align="bottom-right" no-arrow="true">
                    <bk-menu aria-label="workspaces menu">
                        <bk-menu-item title="{{ name }}" ng-repeat="name in workspaceNames" is-selected="isSelectedWorkspace(name)" ng-click="switchWorkspace(name)">
                        </bk-menu-item>
                    </bk-menu>
                </bk-popover-body>
            </bk-popover>
            <bk-toolbar-separator></bk-toolbar-separator>
            <bk-button state="transparent" glyph="sap-icon--clear-filter" title="Clear" aria-label="Clear" ng-disabled="query === ''" ng-click="clear()"></bk-button>
        </bk-toolbar>
        <bk-toolbar compact="true">
            <bk-input type="search" placeholder="Go to symbol in workspace..." auto-focus ng-keyup="onType()" ng-model="query"></bk-input>
        </bk-toolbar>
        <div bk-scrollbar class="bk-fill-parent">
            <bk-message-page glyph="sap-icon--syntax" ng-hide="searching || results.length > 0 || error">
                <bk-message-page-title>Java symbols</bk-message-page-title>
                <bk-message-page-subtitle>Search classes, interfaces, methods and fields across the workspace</bk-message-page-subtitle>
            </bk-message-page>
            <bk-message-page glyph="sap-icon--error" ng-show="error && !searching">
                <bk-message-page-title>{{ error }}</bk-message-page-title>
            </bk-message-page>
            <bk-busy-indicator-extended class="bk-fill-parent" ng-show="searching" size="l">Searching...</bk-busy-indicator-extended>
            <bk-list compact="true" byline="true" ng-show="!searching && results.length > 0">
                <bk-list-item ng-repeat="item in results track by $index" selected="selectedIndex === $index" ng-click="select($index)" ng-dblclick="open($index)" title="{{ item.detail }}">
                    <bk-list-icon glyph="{{ item.icon }}"></bk-list-icon>
                    <bk-list-content item-title="{{ item.name }}">{{ item.detail }}</bk-list-content>
                </bk-list-item>
            </bk-list>
        </div>
        <theme></theme>
    </body>

</html>
