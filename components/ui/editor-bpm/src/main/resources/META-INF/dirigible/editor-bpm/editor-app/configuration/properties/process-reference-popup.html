<div ng-controller="FlowableProcessReferencePopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.PROCESSREFERENCE.TITLE' | translate }}{{ selectedProcess ? ' - ' + selectedProcess.name : ' - ' + ('PROPERTY.PROCESSREFERENCE.EMPTY' | translate) }}">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <div class="detail-group clearfix">
                <div class="col-xs-12">
                    <bk-message-strip type="error" ng-if="(!state.loadingFolders && !state.loadingProcesses) && state.processError">{{ 'PROPERTY.PROCESSREFERENCE.ERROR.PROCESS' | translate }}</bk-message-strip>
                </div>
            </div>
            <div class="detail-group clearfix">
                <div class="col-xs-12 editor-item-picker">
                    <div ng-if="!state.loadingProcesses && !state.processError" class="col-xs-4 editor-item-picker-component" ng-repeat="processModel in processModels" ng-class="{'selected' : processModel.id == selectedProcess.id}" ng-click="selectProcess(processModel, $event)">
                        <div class="controls">
                            <bk-checkbox ng-click="selectProcess(processModel, $event)" ng-checked="processModel.id == selectedProcess.id"></bk-checkbox>
                        </div>
                        <h4>{{ processModel.name }}</h4>
                        <img src="{{ getModelThumbnailUrl(processModel.id) }}" />
                    </div>
                    <div ng-show="state.loadingProcesses">
                        <p class="loading" translate>PROPERTY.PROCESSREFERENCE.PROCESS.LOADING</p>
                    </div>
                    <div ng-show="!state.loadingProcesses && processModels.length == 0">
                        <p translate>PROPERTY.PROCESSREFERENCE.PROCESS.EMPTY</p>
                    </div>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.CANCEL' | translate }}" ng-click="close()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.OPEN' | translate }}" ng-click="open()" ng-disabled="!selectedProcess || state.processError"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()" ng-disabled="state.processError"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
