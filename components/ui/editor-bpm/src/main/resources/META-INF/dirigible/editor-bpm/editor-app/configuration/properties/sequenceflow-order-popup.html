<div ng-controller="FlowableSequenceFlowOrderPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="500px" window-max-width="80vw">
        <bk-dialog-header title="{{ 'PROPERTY.PROPERTY.EDIT.TITLE' | translate }} &quot;{{ property.title | translate }}&quot;">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <p translate>PROPERTY.SEQUENCEFLOW.ORDER.DESCRIPTION</p>
            <ol>
                <li class="sequence-flow-order-element" ng-repeat="sequenceFlow in outgoingSequenceFlow">
                    {{ 'PROPERTY.SEQUENCEFLOW.ORDER.SEQUENCEFLOW.VALUE' | translate:sequenceFlow }}
                    <bk-button ng-if="$index > 0" glyph="sap-icon--slim-arrow-up" aria-label="{{ 'ACTION.MOVE.UP' | translate }}" title="{{ 'ACTION.MOVE.UP' | translate }}" compact="true" ng-click="moveUp($index)"></bk-button>
                    <bk-button ng-if="$index < outgoingSequenceFlow.length - 1" glyph="sap-icon--slim-arrow-down" aria-label="{{ 'ACTION.MOVE.DOWN' | translate }}" title="{{ 'ACTION.MOVE.DOWN' | translate }}" compact="true" ng-click="moveDown($index)"></bk-button>
                </li>
            </ol>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
