<div ng-controller="FlowableCaseReferencePopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.CASEREFERENCE.TITLE' | translate }}{{ selectedCase ? ' - ' + selectedCase.name : ' - ' + ('PROPERTY.CASEREFERENCE.EMPTY' | translate) }}">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <div class="detail-group clearfix">
                <div class="col-xs-12">
                    <bk-message-strip type="error" ng-if="!state.loadingCases && state.caseError">{{ 'PROPERTY.CASEREFERENCE.ERROR.FORM' | translate }}</bk-message-strip>
                </div>
            </div>
            <div class="detail-group clearfix">
                <div class="col-xs-12 editor-item-picker">
                    <div ng-if="!state.loadingCases && !state.caseError" class="col-xs-4 editor-item-picker-component" ng-repeat="caseModel in caseModels" ng-class="{'selected' : caseModel.id == selectedCase.id}" ng-click="selectCase(caseModel, $event)">
                        <div class="controls">
                            <bk-checkbox id="case-ref-cb-{{caseModel.id}}" ng-click="selectCase(caseModel, $event)" ng-checked="caseModel.id == selectedCase.id"></bk-checkbox>
                            <bk-checkbox-label for="case-ref-cb-{{caseModel.id}}" empty="true"></bk-checkbox-label>
                        </div>
                        <h4>{{ caseModel.name }}</h4>
                        <img ng-src="{{ getModelThumbnailUrl(caseModel.id) }}" />
                    </div>
                    <div ng-show="state.loadingCases">
                        <p class="loading" translate>PROPERTY.CASEREFERENCE.CASE.LOADING</p>
                    </div>
                    <div ng-show="!state.loadingCases && caseModels.length == 0">
                        <p translate>PROPERTY.CASEREFERENCE.CASE.EMPTY</p>
                    </div>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.CANCEL' | translate }}" ng-click="close()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.OPEN' | translate }}" ng-click="open()" ng-disabled="!selectedCase || state.caseError"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'GENERAL.ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()" ng-disabled="state.caseError"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
