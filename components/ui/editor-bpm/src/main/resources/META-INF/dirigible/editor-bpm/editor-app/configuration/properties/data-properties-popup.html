<div ng-controller="FlowableDataPropertiesPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.PROPERTY.EDIT.TITLE' | translate }} &quot;{{ property.title | translate }}&quot;">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-vbox bk-box--gap-m bk-padding-top-bottom--sm" data-container="dialog-body">
            <div class="row row-no-gutter">
                <div class="col-xs-6">
                    <div ng-if="translationsRetrieved" class="kis-listener-grid" ui-grid="gridOptions" ui-grid-selection></div>
                    <div class="pull-right">
                        <bk-button glyph="sap-icon--slim-arrow-up" aria-label="{{ 'ACTION.MOVE.UP' | translate }}" title="{{ 'ACTION.MOVE.UP' | translate }}" compact="true" ng-click="movePropertyUp()"></bk-button>
                        <bk-button glyph="sap-icon--slim-arrow-down" aria-label="{{ 'ACTION.MOVE.DOWN' | translate }}" title="{{ 'ACTION.MOVE.DOWN' | translate }}" compact="true" ng-click="movePropertyDown()"></bk-button>
                        <bk-button glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate }}" title="{{ 'ACTION.ADD' | translate }}" compact="true" ng-click="addNewProperty()"></bk-button>
                        <bk-button glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate }}" title="{{ 'ACTION.REMOVE' | translate }}" compact="true" ng-click="removeProperty()"></bk-button>
                    </div>
                </div>
                <div class="col-xs-6">
                    <div ng-show="selectedProperty">
                        <bk-form-group>
                            <bk-form-item>
                                <bk-form-label for="dataPropertyIdField">{{ 'PROPERTY.DATAPROPERTIES.ID' | translate }}</bk-form-label>
                                <bk-input id="dataPropertyIdField" type="text" ng-model="selectedProperty.dataproperty_id" placeholder="{{ 'PROPERTY.DATAPROPERTIES.ID.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="dataPropertyNameField">{{ 'PROPERTY.DATAPROPERTIES.NAME' | translate }}</bk-form-label>
                                <bk-input id="dataPropertyNameField" type="text" ng-model="selectedProperty.dataproperty_name" placeholder="{{ 'PROPERTY.DATAPROPERTIES.NAME.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="dataPropertyTypeField">{{ 'PROPERTY.DATAPROPERTIES.TYPE' | translate }}</bk-form-label>
                                <bk-select label-id="dataPropertyTypeField" ng-model="selectedProperty.dataproperty_type" ng-change="propertyTypeChanged()" dropdown-fixed="true">
                                    <bk-option text="string" value="'string'"></bk-option>
                                    <bk-option text="boolean" value="'boolean'"></bk-option>
                                    <bk-option text="datetime" value="'datetime'"></bk-option>
                                    <bk-option text="double" value="'double'"></bk-option>
                                    <bk-option text="int" value="'int'"></bk-option>
                                    <bk-option text="long" value="'long'"></bk-option>
                                </bk-select>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="dataPropertyValueField">{{ 'PROPERTY.DATAPROPERTIES.VALUE' | translate }}</bk-form-label>
                                <bk-input id="dataPropertyValueField" type="text" ng-model="selectedProperty.dataproperty_value" placeholder="{{ 'PROPERTY.DATAPROPERTIES.VALUE.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                        </bk-form-group>
                    </div>
                    <div ng-show="!selectedProperty" class="muted no-property-selected" translate>PROPERTY.DATAPROPERTIES.EMPTY</div>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
