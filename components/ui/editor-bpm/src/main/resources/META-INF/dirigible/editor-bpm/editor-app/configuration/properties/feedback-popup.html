<div ng-controller="BpmnFeedbackPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="500px" window-max-width="80vw">
        <bk-dialog-header title="{{ 'PROPERTY.FEEDBACK.TITLE' | translate:property }}"></bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <bk-textarea auto-focus ng-model="model.feedback" rows="12" style="width: 100%; min-height: 280px;"></bk-textarea>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SEND' | translate }}" decisive="true" state="emphasized" ng-click="send()" ng-disabled="!model.feedback || model.feedback.length === 0"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
