<div ng-controller="FlowableSignalRefCtrl">
    <bk-select ng-model="property.value" ng-change="signalChanged()" compact="true" dropdown-fixed="true">
        <bk-option ng-repeat="signalDefinition in signalDefinitions" text="{{ signalDefinition.name }} ({{ signalDefinition.id }})" value="signalDefinition.id"></bk-option>
    </bk-select>
</div>
