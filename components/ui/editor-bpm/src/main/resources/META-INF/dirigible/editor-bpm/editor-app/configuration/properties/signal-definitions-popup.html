<div ng-controller="FlowableSignalDefinitionsPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.PROPERTY.EDIT.TITLE' | translate }} &quot;{{ property.title | translate }}&quot;">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-vbox bk-box--gap-m bk-padding-top-bottom--sm" data-container="dialog-body">
            <div class="row row-no-gutter">
                <div class="col-xs-8">
                    <div ng-if="translationsRetrieved" class="kis-listener-grid" ui-grid="gridOptions" ui-grid-selection></div>
                    <div class="pull-right">
                        <bk-button glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate }}" title="{{ 'ACTION.ADD' | translate }}" compact="true" ng-click="addNewSignalDefinition()"></bk-button>
                        <bk-button glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate }}" title="{{ 'ACTION.REMOVE' | translate }}" compact="true" ng-click="removeSignalDefinition()"></bk-button>
                    </div>
                </div>
                <div class="col-xs-4" ng-show="selectedSignalDefinition">
                    <bk-form-group>
                        <bk-form-item>
                            <bk-form-label for="signalDefinitionIdField">{{ 'PROPERTY.SIGNALDEFINITIONS.ID' | translate }}</bk-form-label>
                            <bk-input id="signalDefinitionIdField" type="text" ng-model="selectedSignalDefinition.id"></bk-input>
                        </bk-form-item>
                        <bk-form-item>
                            <bk-form-label for="signalDefinitionNameField">{{ 'PROPERTY.SIGNALDEFINITIONS.NAME' | translate }}</bk-form-label>
                            <bk-input id="signalDefinitionNameField" type="text" ng-model="selectedSignalDefinition.name"></bk-input>
                        </bk-form-item>
                        <bk-form-item>
                            <bk-form-label for="signalDefinitionScopeField">{{ 'PROPERTY.SIGNALDEFINITIONS.SCOPE' | translate }}</bk-form-label>
                            <bk-select label-id="signalDefinitionScopeField" ng-model="selectedSignalDefinition.scope" ng-change="listenerDetailsChanged()" dropdown-fixed="true">
                                <bk-option ng-repeat="option in scopeOptions" text="{{ option.translationId | translate }}" value="option.value"></bk-option>
                            </bk-select>
                        </bk-form-item>
                    </bk-form-group>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
