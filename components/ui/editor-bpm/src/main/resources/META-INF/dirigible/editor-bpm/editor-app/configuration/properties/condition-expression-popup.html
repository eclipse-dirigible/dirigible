<div ng-controller="FlowableConditionExpressionPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="600px" window-max-width="80vw">
        <bk-dialog-header title="{{ 'PROPERTY.SEQUENCEFLOW.CONDITION.TITLE' | translate }}">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <bk-form-group>
                <bk-form-item>
                    <bk-form-label for="conditionStaticValueField">{{ 'PROPERTY.SEQUENCEFLOW.CONDITION.STATIC' | translate }}</bk-form-label>
                    <bk-textarea id="conditionStaticValueField" ng-model="expression.staticValue" rows="6" style="width: 100%; min-height: 120px;"></bk-textarea>
                </bk-form-item>
            </bk-form-group>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="close()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
