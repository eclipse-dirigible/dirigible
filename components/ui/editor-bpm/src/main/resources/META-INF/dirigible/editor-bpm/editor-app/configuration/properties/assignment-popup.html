<div ng-controller="FlowableAssignmentPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="600px" window-max-width="80vw">
        <bk-dialog-header title="{{ 'PROPERTY.ASSIGNMENT.TITLE' | translate }}">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">

            <!-- "Static" mode (the only mode shipped today — IDM is disabled per FR#3602; the
                 IDM-only sections that used to live below were removed when assignment-popup.html
                 was migrated to <bk-dialog>. If IDM ever gets re-enabled, restore those
                 sections from the previous template revision and re-migrate to bk-* components. -->
            <bk-form-group ng-show="popup.assignmentObject.type != 'idm'">
                <bk-form-item>
                    <bk-form-label for="assignmentAssigneeField">{{ 'PROPERTY.ASSIGNMENT.ASSIGNEE' | translate }}</bk-form-label>
                    <bk-input id="assignmentAssigneeField" type="text" ng-model="popup.assignmentObject.static.assignee" placeholder="{{ 'PROPERTY.ASSIGNMENT.ASSIGNEE_PLACEHOLDER' | translate }}"></bk-input>
                </bk-form-item>

                <bk-form-item>
                    <bk-form-label>{{ 'PROPERTY.ASSIGNMENT.CANDIDATE_USERS' | translate }}</bk-form-label>
                    <div ng-repeat="candidateUser in popup.assignmentObject.static.candidateUsers" style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                        <bk-input type="text" ng-model="candidateUser.value" style="flex:1;"></bk-input>
                        <bk-button ng-if="popup.assignmentObject.static.candidateUsers.length > 1" glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate }}" title="{{ 'ACTION.REMOVE' | translate }}" compact="true" state="transparent" ng-click="removeCandidateUserValue($index)"></bk-button>
                        <bk-button ng-if="$index == (popup.assignmentObject.static.candidateUsers.length - 1)" glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate }}" title="{{ 'ACTION.ADD' | translate }}" compact="true" state="transparent" ng-click="addCandidateUserValue($index)"></bk-button>
                    </div>
                </bk-form-item>

                <bk-form-item>
                    <bk-form-label>{{ 'PROPERTY.ASSIGNMENT.CANDIDATE_GROUPS' | translate }}</bk-form-label>
                    <div ng-repeat="candidateGroup in popup.assignmentObject.static.candidateGroups" style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                        <bk-input type="text" ng-model="candidateGroup.value" style="flex:1;"></bk-input>
                        <bk-button ng-if="popup.assignmentObject.static.candidateGroups.length > 1" glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate }}" title="{{ 'ACTION.REMOVE' | translate }}" compact="true" state="transparent" ng-click="removeCandidateGroupValue($index)"></bk-button>
                        <bk-button ng-if="$index == (popup.assignmentObject.static.candidateGroups.length - 1)" glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate }}" title="{{ 'ACTION.ADD' | translate }}" compact="true" state="transparent" ng-click="addCandidateGroupValue($index)"></bk-button>
                    </div>
                </bk-form-item>
            </bk-form-group>

            <bk-form-group>
                <bk-form-item>
                    <bk-checkbox id="assignmentInitiatorCanCompleteField" ng-model="assignment.initiatorCanCompleteTask"></bk-checkbox>
                    <bk-checkbox-label for="assignmentInitiatorCanCompleteField">{{ 'PROPERTY.ASSIGNMENT.INITIATOR-CAN-COMPLETE' | translate }}</bk-checkbox-label>
                </bk-form-item>
            </bk-form-group>

        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="close()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
