<div ng-controller="EditorUnsavedChangesPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="450px" window-max-width="60vw">
        <bk-dialog-header title="{{ 'EDITOR.POPUP.UNSAVED-CHANGES.TITLE' | translate }}"></bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <p translate="EDITOR.POPUP.UNSAVED-CHANGES.DESCRIPTION"></p>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'EDITOR.POPUP.UNSAVED-CHANGES.ACTION.DISCARD' | translate }}" ng-click="discard()" state="negative"></bk-button>
            </bk-bar-element>
            <bk-bar-element ng-show="yesNoCancel">
                <bk-button label="{{ 'EDITOR.POPUP.UNSAVED-CHANGES.ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'EDITOR.POPUP.UNSAVED-CHANGES.ACTION.CONTINUE' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
