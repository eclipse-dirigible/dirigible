<div ng-controller="FlowableMessageRefCtrl">
    <bk-select ng-model="property.value" ng-change="messageChanged()" compact="true" dropdown-fixed="true">
        <bk-option ng-repeat="messageDefinition in messageDefinitions" text="{{ messageDefinition.name }} ({{ messageDefinition.id }})" value="messageDefinition.id"></bk-option>
    </bk-select>
</div>
