<div ng-controller="FlowableInParametersPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.PROPERTY.EDIT.TITLE' | translate }} &quot;{{ property.title | translate }}&quot;">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-vbox bk-box--gap-m bk-padding-top-bottom--sm" data-container="dialog-body">
            <div class="row row-no-gutter">
                <div class="col-xs-6">
                    <div ng-if="translationsRetrieved" class="kis-listener-grid" ui-grid="gridOptions" ui-grid-selection></div>
                    <div class="pull-right">
                        <bk-button glyph="sap-icon--slim-arrow-up" aria-label="{{ 'ACTION.MOVE.UP' | translate }}" title="{{ 'ACTION.MOVE.UP' | translate }}" compact="true" ng-click="moveParameterUp()"></bk-button>
                        <bk-button glyph="sap-icon--slim-arrow-down" aria-label="{{ 'ACTION.MOVE.DOWN' | translate }}" title="{{ 'ACTION.MOVE.DOWN' | translate }}" compact="true" ng-click="moveParameterDown()"></bk-button>
                        <bk-button glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate:property }}" title="{{ 'ACTION.ADD' | translate:property }}" compact="true" ng-click="addNewParameter()"></bk-button>
                        <bk-button glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate:property }}" title="{{ 'ACTION.REMOVE' | translate:property }}" compact="true" ng-click="removeParameter()"></bk-button>
                    </div>
                </div>
                <div class="col-xs-6">
                    <div ng-show="selectedParameter">
                        <bk-form-group>
                            <bk-form-item>
                                <bk-form-label for="inParamSourceField">{{ 'PROPERTY.PARAMETER.SOURCE' | translate }}</bk-form-label>
                                <bk-input id="inParamSourceField" type="text" ng-model="selectedParameter.source" placeholder="{{ 'PROPERTY.PARAMETER.SOURCE.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="inParamSourceExprField">{{ 'PROPERTY.PARAMETER.SOURCEEXPRESSION' | translate }}</bk-form-label>
                                <bk-input id="inParamSourceExprField" type="text" ng-model="selectedParameter.sourceExpression" placeholder="{{ 'PROPERTY.PARAMETER.SOURCEEXPRESSION.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="inParamTargetField">{{ 'PROPERTY.PARAMETER.TARGET' | translate }}</bk-form-label>
                                <bk-input id="inParamTargetField" type="text" ng-model="selectedParameter.target" placeholder="{{ 'PROPERTY.PARAMETER.TARGET.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                        </bk-form-group>
                    </div>
                    <div ng-show="!selectedParameter" class="muted no-property-selected" translate>PROPERTY.PARAMETER.EMPTY</div>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
