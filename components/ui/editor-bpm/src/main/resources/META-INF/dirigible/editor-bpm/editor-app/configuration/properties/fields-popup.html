<div ng-controller="FlowableFieldsPopupCtrl">
    <bk-dialog visible="modal.visible" window-min-width="900px" window-max-width="90vw" window-min-height="500px">
        <bk-dialog-header title="{{ 'PROPERTY.PROPERTY.EDIT.TITLE' | translate }} &quot;{{ property.title | translate }}&quot;">
            <bk-button glyph="sap-icon--decline" aria-label="Close" round="true" compact="true" ng-click="close()"></bk-button>
        </bk-dialog-header>
        <bk-dialog-body class="bk-padding">
            <div class="row row-no-gutter">
                <div class="col-xs-6">
                    <div ng-if="translationsRetrieved" class="kis-listener-grid" ui-grid="gridOptions" ui-grid-selection></div>
                    <div class="pull-right">
                        <bk-button glyph="sap-icon--slim-arrow-up" aria-label="{{ 'ACTION.MOVE.UP' | translate }}" title="{{ 'ACTION.MOVE.UP' | translate }}" compact="true" ng-click="moveFieldUp()"></bk-button>
                        <bk-button glyph="sap-icon--slim-arrow-down" aria-label="{{ 'ACTION.MOVE.DOWN' | translate }}" title="{{ 'ACTION.MOVE.DOWN' | translate }}" compact="true" ng-click="moveFieldDown()"></bk-button>
                        <bk-button glyph="sap-icon--add" aria-label="{{ 'ACTION.ADD' | translate }}" title="{{ 'ACTION.ADD' | translate }}" compact="true" ng-click="addNewField()"></bk-button>
                        <bk-button glyph="sap-icon--less" aria-label="{{ 'ACTION.REMOVE' | translate }}" title="{{ 'ACTION.REMOVE' | translate }}" compact="true" ng-click="removeField()"></bk-button>
                    </div>
                </div>

                <div class="col-xs-6">
                    <div ng-show="selectedField">
                        <bk-form-group>
                            <bk-form-item>
                                <bk-form-label for="fieldNameInput">{{ 'PROPERTY.FIELDS.NAME' | translate }}</bk-form-label>
                                <bk-input id="fieldNameInput" type="text" ng-model="selectedField.name" placeholder="{{ 'PROPERTY.FIELDS.NAME.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="fieldStringValueInput">{{ 'PROPERTY.FIELDS.STRINGVALUE' | translate }}</bk-form-label>
                                <bk-input id="fieldStringValueInput" type="text" ng-model="selectedField.stringValue" ng-change="fieldDetailsChanged()" placeholder="{{ 'PROPERTY.FIELDS.STRINGVALUE.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="fieldExpressionInput">{{ 'PROPERTY.FIELDS.EXPRESSION' | translate }}</bk-form-label>
                                <bk-input id="fieldExpressionInput" type="text" ng-model="selectedField.expression" ng-change="fieldDetailsChanged()" placeholder="{{ 'PROPERTY.FIELDS.EXPRESSION.PLACEHOLDER' | translate }}"></bk-input>
                            </bk-form-item>
                            <bk-form-item>
                                <bk-form-label for="fieldStringInput">{{ 'PROPERTY.FIELDS.STRING' | translate }}</bk-form-label>
                                <bk-textarea id="fieldStringInput" ng-model="selectedField.string" ng-change="fieldDetailsChanged()" placeholder="{{ 'PROPERTY.FIELDS.STRING.PLACEHOLDER' | translate }}"></bk-textarea>
                            </bk-form-item>
                        </bk-form-group>
                    </div>
                    <div ng-show="!selectedField" class="muted no-property-selected" translate>PROPERTY.FIELDS.EMPTY</div>
                </div>
            </div>
        </bk-dialog-body>
        <bk-dialog-footer compact="true">
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.CANCEL' | translate }}" ng-click="cancel()" state="transparent"></bk-button>
            </bk-bar-element>
            <bk-bar-element>
                <bk-button label="{{ 'ACTION.SAVE' | translate }}" decisive="true" state="emphasized" ng-click="save()"></bk-button>
            </bk-bar-element>
        </bk-dialog-footer>
    </bk-dialog>
</div>
