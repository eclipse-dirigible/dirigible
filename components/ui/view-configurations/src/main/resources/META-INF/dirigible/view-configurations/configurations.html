<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="configurations" ng-controller="ConfigurationsController">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="/services/web/view-configurations/configs/configurations-view.js"></script>
        <meta name="platform-links" category="ng-view">
    </head>

    <body class="bk-vbox" shortcut="'ctrl+f'" shortcut-action="toggleSearch">
        <div bk-scrollbar class="bk-full-height">
            <table bk-table display-mode="compact" outer-borders="none">
                <thead bk-table-header sticky="true" interactive="false">
                    <tr bk-table-row>
                        <th bk-table-header-cell>#</th>
                        <th bk-table-header-cell>Name</th>
                        <th bk-table-header-cell>Runtime</th>
                        <th bk-table-header-cell>Environment</th>
                        <th bk-table-header-cell>Deployment</th>
                        <th bk-table-header-cell>Module</th>
                    </tr>
                </thead>
                <tbody bk-table-body>
                    <tr bk-table-row ng-repeat="config in configurations track by config.num" hoverable="true" activable="false" ng-hide="config.hidden">
                        <td bk-table-cell fit-content="true">{{::config.num}}</td>
                        <td bk-table-cell>{{::config.name}}</td>
                        <td bk-table-cell>{{::config.runtime}}</td>
                        <td bk-table-cell>{{::config.env}}</td>
                        <td bk-table-cell>{{::config.deployment}}</td>
                        <td bk-table-cell>{{::config.module}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <bk-bar bar-design="footer" ng-if="searchVisible">
            <bk-bar-middle>
                <bk-bar-element full-width="true" style="max-width: 480px">
                    <bk-input type="search" placeholder="Search" ng-keyup="search($event)" bk-focus="true" ng-model="searchField.text"></bk-input>
                </bk-bar-element>
                <bk-bar-element>
                    <bk-button glyph="sap-icon--decline" aria-label="close search" state="transparent" ng-click="toggleSearch()"></bk-button>
                </bk-bar-element>
            </bk-bar-middle>
        </bk-bar>
        <script type="text/javascript">
            angular.module('configurations', ['platformView', 'platformShortcuts', 'blimpKit']).controller('ConfigurationsController', ($timeout, $scope, $http) => {
                $scope.searchVisible = false;
                $scope.searchField = { text: '' };
                $scope.configurations = [];
                $scope.showAll = () => {
                    for (let i = 0; i < $scope.configurations.length; i++) {
                        $scope.configurations[i].hidden = false;
                    }
                };
                $scope.toggleSearch = (_, event) => {
                    if (event) event.preventDefault();
                    $scope.$evalAsync(() => {
                        $scope.searchField.text = '';
                        $scope.searchVisible = !$scope.searchVisible;
                        $scope.showAll();
                    });
                };

                let to = 0;
                $scope.search = (event) => {
                    if (to) $timeout.cancel(to);
                    if (event.originalEvent.key === 'Escape') {
                        $scope.toggleSearch();
                        return;
                    }
                    to = $timeout(() => {
                        for (let i = 0; i < $scope.configurations.length; i++) {
                            const allValues = Object.values($scope.configurations[i]).join('').toLowerCase();
                            if (allValues.includes($scope.searchField.text.toLowerCase())) {
                                $scope.configurations[i].hidden = false;
                            } else {
                                $scope.configurations[i].hidden = true;
                            }
                        }
                    }, 250);
                };

                function checkEnv(name, value) {
                    if (value && value.length && (name.toLowerCase().includes('password') || name.toLowerCase().includes('secret'))) {
                        return '********';
                    }
                    return value;
                }

                $http.get('/services/core/configurations').then((response) => {
                    for (let i = 0; i < response.data.length; i++) {
                        $scope.configurations.push({
                            num: i + 1,
                            name: response.data[i][0],
                            runtime: response.data[i][1],
                            env: checkEnv(response.data[i][0], response.data[i][2]),
                            deployment: response.data[i][3],
                            module: response.data[i][4],
                            hidden: false
                        });
                    }
                }, (error) => {
                    console.error(error);
                });
            });
        </script>
        <theme></theme>
    </body>

</html>
